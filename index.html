<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zor 的副业工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen">
    <div class="max-w-2xl mx-auto p-8">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-white mb-3">Zor 的副业工具箱</h1>
            <p class="text-gray-400">程序员视角的实用工具</p>
        </div>

        <div class="space-y-4">
            <a href="./mortgage-calculator/index.html"
               class="block bg-gray-800 hover:bg-gray-700 rounded-2xl p-6 transition-colors group">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-semibold text-white group-hover:text-blue-400">🏠 房贷提前还款计算器</h2>
                        <p class="text-gray-400 mt-1 text-sm">算一算，提前还贷能省多少利息</p>
                    </div>
                    <span class="text-gray-500 group-hover:text-blue-400 text-2xl">→</span>
                </div>
            </a>

            <a href="./loan-comparison/index.html"
               class="block bg-gray-800 hover:bg-gray-700 rounded-2xl p-6 transition-colors group">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-semibold text-white group-hover:text-green-400">⚖️ 还款方式对比器</h2>
                        <p class="text-gray-400 mt-1 text-sm">等额本息 vs 等额本金，哪种更划算？</p>
                    </div>
                    <span class="text-gray-500 group-hover:text-green-400 text-2xl">→</span>
                </div>
            </a>

            <a href="./rent-vs-buy-calculator/index.html"
               class="block bg-gray-800 hover:bg-gray-700 rounded-2xl p-6 transition-colors group">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-semibold text-white group-hover:text-cyan-400">🏙️ 买房 vs 租房决策器</h2>
                        <p class="text-gray-400 mt-1 text-sm">对比持有期总成本，快速判断哪种更划算</p>
                    </div>
                    <span class="text-gray-500 group-hover:text-cyan-400 text-2xl">→</span>
                </div>
            </a>
        </div>

        <div class="mt-12 text-center">
            <p class="text-gray-500 text-sm">by Zor · 程序员探索副业中</p>
        </div>
    </div>
</body>
</html>
