<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等额本息 vs 等额本金 - 还款方式对比</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-2xl mx-auto p-6">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">⚖️ 还款方式对比</h1>
            <p class="text-gray-500">等额本息 vs 等额本金，哪种更划算？</p>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">贷款总额（万元）</label>
                    <input type="number" id="loanAmount" value="100" min="1"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 text-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">贷款年限（年）</label>
                    <input type="number" id="loanYears" value="30" min="1" max="30"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 text-lg">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">年利率（%）</label>
                    <input type="number" id="interestRate" value="4.2" step="0.01" min="0"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 text-lg">
                </div>
            </div>

            <button onclick="calculate()"
                    class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-medium py-4 rounded-xl transition-colors text-lg">
                计算
            </button>
        </div>

        <div id="results" class="space-y-4 hidden">
            <!-- 等额本息 -->
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">📈 等额本息</h3>
                <p class="text-sm text-gray-500 mb-4">每月还款额固定，前期利息多本金少</p>
                <div class="grid grid-cols-3 gap-4">
                    <div class="text-center p-3 bg-blue-50 rounded-xl">
                        <p class="text-sm text-blue-600">月供</p>
                        <p class="text-xl font-bold text-blue-800" id="avgMonthly">-</p>
                    </div>
                    <div class="text-center p-3 bg-blue-50 rounded-xl">
                        <p class="text-sm text-blue-600">总利息</p>
                        <p class="text-xl font-bold text-blue-800" id="avgInterest">-</p>
                    </div>
                    <div class="text-center p-3 bg-blue-50 rounded-xl">
                        <p class="text-sm text-blue-600">还款总额</p>
                        <p class="text-xl font-bold text-blue-800" id="avgTotal">-</p>
                    </div>
                </div>
            </div>

            <!-- 等额本金 -->
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">📉 等额本金</h3>
                <p class="text-sm text-gray-500 mb-4">每月本金固定，利息递减，月供逐月减少</p>
                <div class="grid grid-cols-3 gap-4">
                    <div class="text-center p-3 bg-green-50 rounded-xl">
                        <p class="text-sm text-green-600">首月还款</p>
                        <p class="text-xl font-bold text-green-800" id="principalFirst">-</p>
                    </div>
                    <div class="text-center p-3 bg-green-50 rounded-xl">
                        <p class="text-sm text-green-600">总利息</p>
                        <p class="text-xl font-bold text-green-800" id="principalInterest">-</p>
                    </div>
                    <div class="text-center p-3 bg-green-50 rounded-xl">
                        <p class="text-sm text-green-600">还款总额</p>
                        <p class="text-xl font-bold text-green-800" id="principalTotal">-</p>
                    </div>
                </div>
                <div class="mt-4 text-center text-sm text-gray-500">
                    末月还款：<span id="principalLast" class="font-medium">-</span>
                </div>
            </div>

            <!-- 对比结论 -->
            <div class="bg-gradient-to-br from-purple-50 to-pink-50 rounded-2xl shadow-lg p-6 border border-purple-100">
                <h3 class="text-lg font-semibold text-purple-800 mb-4">💡 对比结论</h3>
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div>
                        <p class="text-sm text-purple-600">利息差额</p>
                        <p class="text-2xl font-bold text-purple-800" id="interestDiff">-</p>
                        <p class="text-xs text-purple-500 mt-1">等额本金少付</p>
                    </div>
                    <div>
                        <p class="text-sm text-purple-600">前期压力</p>
                        <p class="text-2xl font-bold text-purple-800" id="pressureDiff">-</p>
                        <p class="text-xs text-purple-500 mt-1">等额本息更轻松</p>
                    </div>
                </div>
                <div class="mt-4 p-3 bg-white/50 rounded-xl text-sm text-purple-700" id="conclusion">
                    -
                </div>
            </div>
        </div>
    </div>

    <script>
        // 等额本息
        function calcAvgInterest(principal, annualRate, months) {
            const monthlyRate = annualRate / 100 / 12;
            const monthlyPayment = principal * monthlyRate * Math.pow(1 + monthlyRate, months)
                                   / (Math.pow(1 + monthlyRate, months) - 1);
            return {
                monthly: monthlyPayment,
                totalInterest: monthlyPayment * months - principal,
                total: monthlyPayment * months
            };
        }

        // 等额本金
        function calcPrincipal(principal, annualRate, months) {
            const monthlyRate = annualRate / 100 / 12;
            const monthlyPrincipal = principal / months;
            const firstMonth = monthlyPrincipal + principal * monthlyRate;
            const lastMonth = monthlyPrincipal + monthlyPrincipal * monthlyRate;

            // 总利息 = 月利息之和
            let totalInterest = 0;
            let remaining = principal;
            for (let i = 0; i < months; i++) {
                totalInterest += remaining * monthlyRate;
                remaining -= monthlyPrincipal;
            }

            return {
                firstMonth,
                lastMonth,
                totalInterest,
                total: principal + totalInterest
            };
        }

        function formatMoney(value) {
            if (value >= 10000) {
                return (value / 10000).toFixed(2) + '万';
            }
            return value.toFixed(0) + '元';
        }

        function calculate() {
            const loanAmount = parseFloat(document.getElementById('loanAmount').value) * 10000;
            const loanYears = parseInt(document.getElementById('loanYears').value);
            const interestRate = parseFloat(document.getElementById('interestRate').value);
            const months = loanYears * 12;

            const avg = calcAvgInterest(loanAmount, interestRate, months);
            const principal = calcPrincipal(loanAmount, interestRate, months);

            document.getElementById('results').classList.remove('hidden');

            document.getElementById('avgMonthly').textContent = formatMoney(avg.monthly);
            document.getElementById('avgInterest').textContent = formatMoney(avg.totalInterest);
            document.getElementById('avgTotal').textContent = formatMoney(avg.total);

            document.getElementById('principalFirst').textContent = formatMoney(principal.firstMonth);
            document.getElementById('principalInterest').textContent = formatMoney(principal.totalInterest);
            document.getElementById('principalTotal').textContent = formatMoney(principal.total);
            document.getElementById('principalLast').textContent = formatMoney(principal.lastMonth);

            const interestDiff = avg.totalInterest - principal.totalInterest;
            const pressureDiff = principal.firstMonth - avg.monthly;

            document.getElementById('interestDiff').textContent = formatMoney(interestDiff);
            document.getElementById('pressureDiff').textContent = formatMoney(pressureDiff);

            // 结论
            const conclusion = `等额本金总利息少 ${formatMoney(interestDiff)}，但前期月供比等额本息高 ${formatMoney(pressureDiff)}。
如果你前期资金紧张，选等额本息；如果你想少付利息，选等额本金。`;
            document.getElementById('conclusion').textContent = conclusion;
        }

        calculate();
    </script>
</body>
</html>
